services:
  app:
    build: .
    container_name: jerseygarage
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped

# ```

# What each line does:

# - **`build: .`** — builds the Docker image using the `Dockerfile` in the current folder
# - **`container_name: jerseygarage`** — gives your container a readable name instead of a random one
# - **`ports: "3000:3000"`** — maps EC2 port 3000 to container port 3000 so the outside world can reach it
# - **`env_file: .env`** — loads your `.env` into the container so `process.env.MONGO_URI` etc. all work
# - **`restart: unless-stopped`** — if the container crashes or EC2 reboots, Docker automatically restarts it. Only stays stopped if you manually run `docker compose down`

# ---

# Save this as `docker-compose.yml` in your project root alongside your Dockerfile:
# ```
# JerseyGarage/
# ├── Dockerfile
# ├── .dockerignore
# ├── docker-compose.yml   ← new
# ├── .gitignore
# ├── app.js
# └── ...
