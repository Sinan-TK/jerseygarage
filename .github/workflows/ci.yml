name: CI

on:
  push:
    branches:
      - hosting-1
  pull_request:
    branches:
      - hosting-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: node --check app.js